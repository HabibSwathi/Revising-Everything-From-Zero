<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .box {
            background-color: blue;
            padding: 10px;
            width: 100px;
            height: 100px;
            margin: 10px;
            color: blue;
        }

        .horizontalMain{
            display: flex;
            justify-content: center;
        }

        .HorizontalBox {
            background-color: rgb(255, 0, 183);
            padding: 10px;
            width: 100px;
            height: 100px;
            margin: 10px;
            color: rgb(255, 0, 183);
            
        }

        .VerticalMain{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }

        .VerticalBox {
            background-color: rgb(255, 145, 0);
            padding: 10px;
            width: 100px;
            height: 100px;
            margin: 10px;
            color: rgb(255, 145, 0);
        }

        .evenlyMain{
            display: flex;
            justify-content: space-evenly;
        }

        .evenlyBox {
            background-color: rgb(0, 238, 255);
            padding: 10px;
            width: 100px;
            height: 100px;
            margin: 10px;
            color: rgb(0, 238, 255);
        }

        .columnMain{
            display: flex;
            flex-direction: column;
        }

        .columnBox {
            background-color: rgb(255, 0, 21);
            padding: 10px;
            width: 100px;
            height: 100px;
            margin: 10px;
            color: rgb(255, 0, 21);
        }

        .extraMain{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 300px;
        }

        .extraBox {
            background-color: rgb(13, 93, 24);
            padding: 10px;
            width: 100px;
            height: 100px;
            margin: 10px;
            color: rgb(13, 93, 24);
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box">
            a
        </div>
        <div class="box">
            a
        </div>
        <div class="box">
            a
        </div>
    </div>

    <div class="horizontalMain">
        <div class="HorizontalBox">
            a
        </div>
        <div class="HorizontalBox">
            a
        </div>
        <div class="HorizontalBox">
            a
        </div>
    </div>

    <div class="VerticalMain">
        <div class="VerticalBox">
            a
        </div>
        <div class="VerticalBox">
            a
        </div>
        <div class="VerticalBox">
            a
        </div>
    </div>

    <div class="evenlyMain">
        <div class="evenlyBox">
            a
        </div>
        <div class="evenlyBox">
            a
        </div>
        <div class="evenlyBox">
            a
        </div>
    </div>

    <div class="columnMain">
        <div class="columnBox">
            a
        </div>
        <div class="columnBox">
            a
        </div>
        <div class="columnBox">
            a
        </div>
    </div>

    <div class="extraMain">
        <div class="extraBox">
            a
        </div>
        <div class="extraBox">
            a
        </div>
        <div class="extraBox">
            a
        </div>
    </div>
</body>
</html>
